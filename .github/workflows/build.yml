name: Build Verity Mod

on:
  push:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract source zip
        run: unzip -o verity-mod.zip -d extracted

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.8

      - name: Build with Gradle
        working-directory: extracted/verity-mod
        run: gradle build --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: verity-mod-jar
          path: extracted/verity-mod/build/libs/*.jar
